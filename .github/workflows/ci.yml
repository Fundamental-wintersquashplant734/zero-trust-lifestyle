name: CI - Syntax & Smoke Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl bc

      - name: Syntax check scripts/*.sh
        run: |
          for f in scripts/*.sh; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done

      - name: Syntax check lib/*.sh
        run: |
          for f in lib/*.sh; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done

      - name: Smoke test --help for scripts/*.sh
        run: |
          for f in scripts/*.sh; do
            echo "Running --help: $f"
            bash "$f" --help
            exit_code=$?
            if [ $exit_code -ne 0 ] && [ $exit_code -ne 1 ]; then
              echo "FAIL: $f exited with code $exit_code"
              exit 1
            fi
          done
